#config-version=FGT60F-7.0.10-FW-build1234-230101:opmode=0:vdom=0
#conf_file_ver=18927000000000000001
#buildno=1234
#global_vdom=1
config system global
    set admin-https-redirect disable
    set admin-sport 443
    set admin-http-port 80
    set admintimeout 30
    set hostname "FGT-OT-LAB"
    set pre-login-banner disable
    set post-login-banner disable
    set strong-crypto disable
    set admin-lockout-threshold 0
    set admin-lockout-duration 60
    set admin-https-ssl-versions "tlsv1-0 tlsv1-1 tlsv1-2"
    set tcp-session-without-syn enable
    set gui-ipv6 enable
    set lldp-reception enable
    set fips-cc disable
    set admin-scp disable
    set admin-ssh-grace-time 300
    set revision-backup-on-logout disable
    set cfg-save automatic
    set auto-install-config enable
    set revision-image-auto-backup disable
    set admin-restrict-local disable
end
config system password-policy
    set minimum-length 6
    set min-upper-case-letter 0
    set min-lower-case-letter 0
    set min-number 0
    set min-non-alphanumeric 0
    set expire-day 0
    set reuse-password enable
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        set vdom "root"
        set two-factor disable
        set trusthost1 "0.0.0.0 0.0.0.0"
    next
    edit "backup-admin"
        set accprofile "super_admin"
        set vdom "root"
        set two-factor disable
        set trusthost1 "0.0.0.0 0.0.0.0"
        set guest-auth enable
    next
end
config system settings
    set sip-helper enable
    set ecmp-max-paths 32
    set multicast-forward enable
    set allow-subnet-overlap enable
    set central-nat disable
    set gui-allow-unnamed-policy enable
end
config system interface
    edit "wan1"
        set type physical
        set role wan
        set allowaccess https ssh http telnet ping snmp fgfm
        set dhcp-relay-service enable
        set dns-server-override disable
        set src-check disable
    next
    edit "lan"
        set type physical
        set role lan
        set allowaccess https ssh ping
        set src-check enable
    next
end
config firewall policy
    edit 1
        set name "Allow-All-Internet"
        set action accept
        set status enable
        set srcintf "lan"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set logtraffic disable
        set schedule "always"
    next
    edit 2
        set name "Deny-Block"
        set action deny
        set status enable
        set srcintf "wan1"
        set dstintf "lan"
        set srcaddr "Bad-IPs"
        set dstaddr "all"
        set service "ALL"
        set logtraffic disable
    next
end
config vpn ssl settings
    set status enable
    set ssl-min-proto-ver tlsv1-0
    set port 443
    set idle-timeout 3600
    set login-attempt-limit 10
    set tunnel-connect-without-reauth enable
    set dtls-tunnel disable
    set http-compression enable
    set reqclientcert disable
end
config vpn ipsec phase1-interface
    edit "Site-B-Tunnel"
        set mode aggressive
        set proposal "des-md5 3des-md5"
        set dhgrp "1 2"
        set dpd disable
        set ike-version 1
        set keylife 172800
        set authmethod psk
    next
end
config log syslogd setting
    set status disable
end
config log fortianalyzer setting
    set status disable
end
config system snmp community
    edit 1
        set name "public"
        set status enable
    next
end
